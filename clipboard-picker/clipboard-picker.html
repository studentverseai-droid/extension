<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Select note to paste - Snipaze</title><link rel="stylesheet" href="clipboard-picker.css"></head>
<body><main class="snip-ocr-copy-picker" role="dialog" aria-label="Select note to paste">
<div class="snip-ocr-copy-picker-header"><strong>Select note to paste</strong></div>
<section data-picker hidden><div class="snip-ocr-copy-picker-list"><button class="snip-ocr-copy-picker-create" type="button" data-create-toggle>+ Create New Note</button><form class="snip-ocr-copy-new-note" data-create-form hidden><label><span>New Note Name</span><input data-title placeholder="Enter note name..." maxlength="100"></label><label><span>Category</span><select data-category></select></label><div class="snip-ocr-copy-new-actions"><button type="submit">Create</button><button type="button" data-create-cancel>Cancel</button></div></form><div class="notes" data-notes></div></div></section>
<p class="status" data-status role="status"></p><button class="snip-ocr-copy-picker-cancel" type="button" data-close>Cancel</button>
</main><script src="../db/indexeddb.js"></script><script src="../themes/theme-manager.js"></script><script src="../ui/html-utils.js"></script><script src="../ui/note-sort.js"></script><script src="clipboard-picker.js"></script></body></html>
